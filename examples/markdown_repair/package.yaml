goal_traceability:
  - requirement: Repair ambiguous Markdown structure.
    stage: worker
    verification: deterministic structure gates followed by independent semantic review
  - requirement: Preserve front matter exactly.
    stage: deterministic validation
    verification: parsed source and candidate front matter equality
  - requirement: Preserve prose meaning.
    stage: reviewer
    verification: bounded semantic verdict after deterministic validation
  - requirement: Fail safely when intended meaning is unavailable.
    stage: worker
    verification: unable result produces terminal quarantine
prompt_files: [prompts/worker.md, prompts/reviewer.md, prompts/repair.md, prompts/failure-analysis.md, prompts/remediation.md, prompts/performance.md]
